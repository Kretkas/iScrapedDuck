name: Scrape LeekDuck

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Main Job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
            fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run scrape.js
        run: npm run scrape

      - name: Run detailedscrape.js
        run: npm run detailedscrape

      - name: Run combinedetails.js
        run: npm run combinedetails

      - name: Run raid JSON validation
        run: npm run check:raids

      - name: Delete repo files
        run: |
          mv files ..
          rm -r .github
          rm -r .gitignore
          rm -rf *
          cp -a ../files/. .
          rm -r ../files
  
      - name: Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git switch --orphan data
          git add --all
          git commit -m 'Data updated'

      - name: Push
        run: git push origin HEAD:data --force
